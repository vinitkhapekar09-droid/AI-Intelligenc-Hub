name: CI — Test & Lint

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: daily_digest
          POSTGRES_USER: digest_user
          POSTGRES_PASSWORD: password123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://digest_user:password123@localhost:5432/daily_digest
      REDIS_URL: redis://localhost:6379/0
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      FROM_EMAIL: onboarding@resend.dev
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      MLFLOW_TRACKING_URL: http://localhost:5000
      SECRET_KEY: test-secret-key
      ENVIRONMENT: testing
      TRIGGER_DIGEST_TOKEN: test-trigger-token

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 backend/app --max-line-length=100 --ignore=E501,W503

      - name: Run tests
        run: |
          pip install pytest httpx
          rm -f test_api_fresh.db
          DATABASE_URL=sqlite:///test_api_fresh.db \
          GEMINI_API_KEY=test \
          RESEND_API_KEY=test \
          NEWS_API_KEY=test \
          MLFLOW_TRACKING_URL=http://localhost:5000 \
          TRIGGER_DIGEST_TOKEN=test-trigger-token \
          python -m pytest tests/ -v

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE: /api
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile
          push: false

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.frontend
          push: false
          build-args: |
            VITE_API_BASE=/api
