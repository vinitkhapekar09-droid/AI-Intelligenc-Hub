name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.DO_SSH_USER }}@${{ secrets.DO_HOST }} "
            set -e
            cd /opt/ai_explore
            git pull origin main
            for image in python:3.11-slim postgres:15-alpine redis:7-alpine caddy:2-alpine; do
              for attempt in 1 2 3; do
                if docker pull \"$image\"; then
                  break
                fi
                if [ \"$attempt\" -eq 3 ]; then
                  exit 1
                fi
                sleep 3
              done
            done
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans
            docker image prune -f
            echo Deploy complete
          "
