name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.DO_SSH_USER }}@${{ secrets.DO_HOST }} bash -s <<'EOFBASH'
set -e
cd /opt/ai_explore
git pull origin main
docker compose -f docker-compose.prod.yml up -d --build --remove-orphans
docker image prune -f || true
echo "==== BEGIN CADDY LOGS ===="
docker compose -f docker-compose.prod.yml logs caddy --tail 200 || true
echo "==== CADDY PROCESS STATUS ===="
docker ps --filter name=ai_explore-caddy-1 --format "table {{.Names}}\t{{.Status}}" || true
echo "==== PORT LISTENERS ===="
ss -ltnp 2>/dev/null | grep -E ':80|:443' || echo "No listeners found"
echo Deploy complete
EOFBASH
