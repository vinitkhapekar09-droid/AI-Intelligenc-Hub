services:

  # ── PostgreSQL ────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: daily_digest
      POSTGRES_USER: digest_user
      POSTGRES_PASSWORD: password123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U digest_user -d daily_digest"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MLflow ────────────────────────────────────────────────
  mlflow:
    image: python:3.11-slim
    command: >
      bash -c "pip install mlflow psycopg2-binary -q &&
               mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlflow/data --default-artifact-root /mlflow/artifacts --allowed-hosts mlflow,mlflow:5000,localhost,localhost:5000,127.0.0.1,127.0.0.1:5000"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── FastAPI ───────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://digest_user:password123@db:5432/daily_digest
      - REDIS_URL=redis://redis:6379/0
      - MLFLOW_TRACKING_URL=http://mlflow:5000
    volumes:
      - chroma_data:/tmp/chroma

  # ── Celery Worker ─────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    command: celery -A app.core.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://digest_user:password123@db:5432/daily_digest
      - REDIS_URL=redis://redis:6379/0
      - MLFLOW_TRACKING_URL=http://mlflow:5000
    volumes:
    - chroma_data:/tmp/chroma

  # ── Celery Beat ───────────────────────────────────────────
  beat:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    command: celery -A app.core.celery_app beat --loglevel=info
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://digest_user:password123@db:5432/daily_digest
      - REDIS_URL=redis://redis:6379/0
      - MLFLOW_TRACKING_URL=http://mlflow:5000

  # ── Flower (Celery monitor) ───────────────────────────────
  flower:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    command: celery -A app.core.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MLFLOW_TRACKING_URL=http://mlflow:5000

  # ── Prometheus ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - api

  # ── Grafana ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  # ── Streamlit Frontend ────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.streamlit
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://api:8000   # WHY? Inside Docker, services talk by name
    depends_on:
      - api
    volumes:
      - ./frontend:/app            # Mount frontend folder into container
      
volumes:
  postgres_data:
  mlflow_data:
  prometheus_data:
  grafana_data:
  chroma_data: 