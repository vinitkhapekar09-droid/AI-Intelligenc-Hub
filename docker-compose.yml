services:

  # ── PostgreSQL ────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: daily_digest
      POSTGRES_USER: digest_user
      POSTGRES_PASSWORD: password123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U digest_user -d daily_digest"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MLflow ────────────────────────────────────────────────
  mlflow:
    image: python:3.11-slim
    command: >
      bash -c "pip install mlflow psycopg2-binary -q &&
               mlflow server --host 0.0.0.0 --port 5000
               --backend-store-uri /mlflow/data
               --default-artifact-root /mlflow/artifacts
               --allowed-hosts mlflow,localhost,127.0.0.1"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── FastAPI ───────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://digest_user:password123@db:5432/daily_digest
      - REDIS_URL=redis://redis:6379/0
      - MLFLOW_TRACKING_URL=http://mlflow:5000
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000

  # ── Celery Worker ─────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=1
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://digest_user:password123@db:5432/daily_digest
      - REDIS_URL=redis://redis:6379/0
      - MLFLOW_TRACKING_URL=http://mlflow:5000

  # ── Celery Beat ───────────────────────────────────────────
  beat:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    command: celery -A app.core.celery_app beat --loglevel=info
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://digest_user:password123@db:5432/daily_digest
      - REDIS_URL=redis://redis:6379/0
      - MLFLOW_TRACKING_URL=http://mlflow:5000

  # ── React Frontend ────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.frontend
      args:
        VITE_API_BASE: /api
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE=/api
    depends_on:
      - api

volumes:
  postgres_data:
  mlflow_data:
